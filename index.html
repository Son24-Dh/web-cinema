<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>DÂU CINEMA 🍓 - Xem Phim Online Miễn Phí</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍓</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html" class="logo">🍓 DÂU CINEMA</a>
        <nav class="nav-links">
            <a href="index.html" class="active">Trang Chủ</a>
            <a href="#" onclick="filterMovies('phim-bo')">Phim Bộ</a>
            <a href="#" onclick="filterMovies('phim-le')">Phim Lẻ</a>
        </nav>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterMovies('all')">Tất Cả</button>
            <button class="filter-btn" onclick="filterMovies('phim-bo')">Phim Bộ</button>
            <button class="filter-btn" onclick="filterMovies('phim-le')">Phim Lẻ</button>
        </div>
    </div>

    <main>
        <h2 style="margin: 0 0 20px 0; font-size: 1.2rem; color: var(--primary);">PHIM MỚI CẬP NHẬT 🎬</h2>
        <div class="movie-grid" id="movie-grid">
            <!-- Render động bằng JS -->
        </div>
    </main>

    <footer>
        <p>Made with 🍓 by Your Boyfriend • 2026</p>
    </footer>

    <script src="data.js"></script>
    <script>
        function renderMovies(movieList) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            
            movieList.forEach((movie, index) => {
                const card = document.createElement('a');
                card.href = `watch.html?id=${movie.id}&tap=1`;
                card.className = 'movie-card';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.name}">
                    <div class="info">
                        <h3>${movie.name}</h3>
                        <p>${movie.year} • ${movie.category === 'phim-bo' ? 'Phim Bộ' : 'Phim Lẻ'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.filterMovies = (category) => {
            // Cập nhật trạng thái nút lọc
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnCategory = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
                btn.classList.toggle('active', btnCategory === category);
            });

            const allMovies = Object.values(movies);
            let filtered = allMovies;
            
            if (category !== 'all') {
                filtered = allMovies.filter(m => m.category === category);
            }
            
            renderMovies(filtered);
        };

        // Khởi tạo
        document.addEventListener('DOMContentLoaded', () => {
            renderMovies(Object.values(movies));
        });
    </script>
</body>
</html>
