<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>Đang xem phim - DâuPhim</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Thư viện phát video HLS -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="brand" aria-label="DâuPhim trang chủ">
            <span class="brand-mark">▶</span>
            <span>
                <strong>DâuPhim</strong>
                <small>Phim hay của Nhi</small>
            </span>
        </a>

        <label class="search-box" aria-label="Tìm kiếm phim">
            <span>⌕</span>
            <input type="search" placeholder="Tìm kiếm phim, diễn viên">
        </label>

        <nav class="nav-links" aria-label="Điều hướng chính">
            <a href="index.html#topics">Chủ Đề</a>
            <a href="index.html#movies">Thể loại</a>
            <a href="index.html#movies">Phim Lẻ</a>
            <a href="index.html#movies">Phim Bộ</a>
            <a href="index.html#movies">Quốc gia</a>
            <a href="index.html#movies">Diễn Viên</a>
            <a href="index.html#movies">Lịch Chiếu</a>
        </nav>

        <a class="member-pill" href="index.html#for-nhi">Phương Nhi</a>
    </header>

    <main>
        <div class="watch-container">
            <!-- Bên trái: Trình phát video -->
            <div class="left-col">
                <div class="player-section">
                    <video id="video-player" controls autoplay></video>
                </div>
                <!-- Chọn Server -->
                <div class="server-section" id="server-section">
                    <h4>Chọn Nguồn Phát</h4>
                    <div class="server-list" id="server-list">
                        <!-- Server buttons will be rendered here -->
                    </div>
                </div>
                <div class="movie-details">
                    <h1 id="movie-title">Loading...</h1>
                    <p id="movie-desc"></p>
                </div>
            </div>

            <!-- Bên phải: Danh sách tập phim -->
            <div class="episode-sidebar">
                <h3>Danh Sách Tập</h3>
                <div class="ep-list" id="episode-list">
                    <!-- Các nút tập phim sẽ được render bởi app.js -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>DâuPhim được làm riêng cho Phương Nhi.</p>
    </footer>

    <script src="video-config.js"></script>
    <script src="data.js"></script>
    <script src="data-loader.js"></script>
    <script src="android-menu.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
    </script>
</body>
</html>
